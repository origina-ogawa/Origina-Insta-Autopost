# 曜日ごとにカテゴリを固定し、その中のテーマを毎週ローテーションする。
# (例: 月曜は毎週「AIに選ばれるHP」カテゴリ、週が変わるとテーマが1つ進む)
# 各曜日6本 = 6週間でひと巡り。テーマは自由に追加・削除してよい。
# 土日や祝日など月〜金以外に実行された場合は、月曜のカテゴリにフォールバックする。
#
# theme: 投稿のテーマ / points: AIに伝えたい切り口メモ(任意)

weekly:
  monday:
    category: AIに選ばれるHP
    topics:
      - theme: AIに引用・推薦されるホームページの作り方
        points: LLMO、構造化データ、FAQ、一次情報、引用されやすい書き方
      - theme: ChatGPTやPerplexityに載る会社・載らない会社の違い
        points: 情報の網羅性、専門性、更新頻度、公式情報の整備
      - theme: 検索の主役がGoogleからAIに移る「AEO」対策の基本
        points: AEOとは、従来SEOとの違い、質問形コンテンツ、回答の明快さ
      - theme: 構造化データとFAQでAIに正しく理解されるサイト設計
        points: schema.org、FAQ構造化、パンくず、AIクローラー対策
      - theme: E-E-A-Tを高めてAIにも人にも信頼されるコンテンツ
        points: 経験・専門性・権威性・信頼性、実績の見せ方、著者情報
      - theme: 従来のSEOとAI時代のLLMOは何が変わったか
        points: キーワードから文脈へ、被引用、ブランド指名、情報鮮度

  tuesday:
    category: 脱エクセル・業務効率化
    topics:
      - theme: 見積書・請求書作成をAIで半自動化する方法
        points: テンプレ化、入力の自動化、ミス削減、時短効果
      - theme: 議事録・日報をAIに丸投げして時短する実例
        points: 文字起こし、要約、担当者アサイン、フォーマット統一
      - theme: 属人化した業務をAIでマニュアル化するコツ
        points: 手順の言語化、引き継ぎ、動画+AI要約、標準化
      - theme: 問い合わせ対応をAIチャットで24時間化する
        points: FAQ自動応答、一次対応、有人切り替え、機会損失防止
      - theme: エクセル関数で消耗しない、AIデータ集計術
        points: 表の読み取り、集計指示、グラフ化、関数不要の分析
      - theme: 中小企業がまず着手すべきAI業務改善3ステップ
        points: 小さく始める、定型業務から、効果測定、社内展開

  wednesday:
    category: AIサービスの選び方
    topics:
      - theme: ChatGPT・Claude・Geminiの違いと使い分け
        points: 得意分野、料金、日本語性能、用途別のおすすめ
      - theme: 無料AIと有料AI、どこで差がつくのか
        points: 精度、上限、機能、セキュリティ、業務利用の判断基準
      - theme: 画像生成AIの選び方と商用利用の注意点
        points: 用途別ツール、著作権、日本語文字、規約確認
      - theme: 社内AI導入で失敗しないツール選定チェックリスト
        points: 目的定義、セキュリティ、料金、サポート、試験導入
      - theme: 「とりあえずChatGPT」から一歩進む使い分け術
        points: タスク別の最適ツール、連携、コスト最適化
      - theme: AI議事録・文字起こしツールの比較ポイント
        points: 精度、話者分離、要約、料金、セキュリティ

  thursday:
    category: AIエージェント最前線
    topics:
      - theme: AIエージェントとは?チャットAIとの違い
        points: 自律実行、タスク分解、ツール連携、具体イメージ
      - theme: 予約・問い合わせを自動化するAIエージェント事例
        points: 24時間対応、一次対応、人手不足の解消、導入例
      - theme: 複数の作業を任せる「自律型AI」でできること
        points: 調査→作成→送信、業務の連鎖自動化、限界と注意点
      - theme: AIエージェント導入前に整えておくべき社内データ
        points: データの整理、権限設計、ナレッジ化、セキュリティ
      - theme: 人手不足をAIエージェントで補う中小企業の未来
        points: 省人化、生産性、属人化解消、現実的な始め方
      - theme: MCP・AI連携で業務が丸ごと自動化される仕組み
        points: ツール接続、データ横断、ワークフロー自動化、身近な例

  friday:
    category: SNS集客術
    topics:
      - theme: 中小企業がSNSとHPを連携させて集客する方法
        points: プロフィールリンク、投稿からの導線、役割分担
      - theme: 保存されるInstagram投稿の共通点
        points: 有益性、まとめ形式、保存を促す一言、デザイン
      - theme: フォロワーを「見込み客」に変えるプロフィール設計
        points: 何者か明示、実績、リンク、次の行動の提示
      - theme: SNS運用を続けられる仕組みの作り方(AI活用)
        points: ネタ管理、テンプレ化、自動生成、投稿予約
      - theme: 投稿ネタが尽きない、テーマの見つけ方
        points: 顧客の質問、よくある悩み、事例、季節性
      - theme: SNSからホームページへ自然に誘導する導線設計
        points: プロフィールリンク、ストーリーズ、CTA、LP設計
