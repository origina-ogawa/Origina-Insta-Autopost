# 投稿テーマのリスト。上から日替わりでローテーションします(使い切ると先頭に戻る)。
# theme: 投稿のテーマ / points: AIに伝えたい切り口メモ(任意)
topics:
  - theme: 発注してはいけないWeb制作会社の特徴
    points: 独自ドメインのメール未使用、格安すぎる料金、実績しか語れない、AI時代の集客を説明できない
  - theme: ホームページ制作の相場と料金の内訳
    points: 安さのカラクリ、テンプレと戦略設計の違い、総額と契約条件の確認
  - theme: ホームページ公開後にやるべき運用チェックリスト
    points: アクセス解析、更新頻度、問い合わせ導線、スマホ表示の確認
  - theme: 集客できるホームページと できないホームページの違い
    points: ターゲット設計、導線設計、E-E-A-T、事例の見せ方
  - theme: AI検索時代(ChatGPT・Perplexity)に選ばれるサイトの作り方
    points: 構造化データ、FAQ、引用されやすいコンテンツ設計
  - theme: 小さな会社がSNSとホームページを連携させる方法
    points: プロフィールリンク、投稿からの導線、更新の分担
  - theme: ホームページリニューアルのタイミングと判断基準
    points: スマホ非対応、更新できない、問い合わせが来ない、デザインの陳腐化
  - theme: 問い合わせが増えるお問い合わせページの作り方
    points: 入力項目を減らす、不安の解消、返信目安の明記
  - theme: Web制作の見積もりで必ず確認すべき項目
    points: 所有権、サーバー・ドメイン名義、解約条件、保守範囲
  - theme: Googleビジネスプロフィールとホームページの使い分け
    points: MEO、口コミ、営業時間、写真の更新
