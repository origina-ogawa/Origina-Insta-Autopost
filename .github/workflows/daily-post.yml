# 平日のお昼休み前後(JST 12:30)にカルーセル投稿を自動生成してInstagramに投稿する
# ランチタイムは「まとめ・保存され やすいコンテンツ」が伸びやすい時間帯とされるため採用
name: daily-instagram-post

on:
  schedule:
    # UTC 3:30 = JST 12:30 月〜金 (GitHubのcronは最大15〜30分ほど遅れることがあります)
    - cron: '30 3 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '生成のみ(Instagramに投稿しない)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存関係のインストール
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: 文章生成 (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          BRAND: ${{ vars.BRAND || 'own' }}
        run: npm run generate

      - name: スライド画像の生成 (Playwright)
        env:
          BRAND: ${{ vars.BRAND || 'own' }}
        run: npm run render

      - name: 生成結果をArtifactに保存(確認用)
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.run_id }}
          path: |
            output/*.png
            output/post.json
          retention-days: 14

      - name: 画像をリポジトリにコミット(公開URL化)
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        id: commit
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          mkdir -p "posts/$DATE"
          cp output/slide-*.png output/post.json "posts/$DATE/"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts
          git commit -m "自動投稿: $DATE"
          git push
          echo "base_url=https://raw.githubusercontent.com/${{ github.repository }}/$(git rev-parse HEAD)/posts/$DATE" >> "$GITHUB_OUTPUT"

      - name: Instagramへ投稿
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_BASE_URL: ${{ steps.commit.outputs.base_url }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: npm run publish:ig
